<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        #area {
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, Helvetica, sans-serif;
            width: 300px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>

    <script>
        const area = document.getElementById('area');
        area.addEventListener('click', clicar);
        area.addEventListener('mouseover', entrar);
        area.addEventListener('mouseout', sair);

        function clicar() {
            const area = document.getElementById('area');
            area.innerText = 'Você clicou na área!';
        }

        function entrar() {
            const area = document.getElementById('area');
            area.innerText = 'Você entrou na área!';
            area.style.backgroundColor = '#d0e0f0';
        }

        function sair() {
            const area = document.getElementById('area');
            area.innerText = 'Você saiu da área!';
            area.style.backgroundColor = '#f0f0f0';
        }
    </script>

</body>
</html>
