<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Nacionalidade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
        }
        .botao-verificar {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
        p {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Verificação de Nacionalidade</h1>
    <input type="text" id="pais" placeholder="Digite seu país" onkeypress="if(event.key === 'Enter') verificarNacionalidade()">
    <button class="botao-verificar" onclick="verificarNacionalidade()">Verificar</button>
    <p id="resultado"></p>

    <script>
        function verificarNacionalidade() {
            let pais = document.getElementById('pais').value;
            let resultado = document.getElementById('resultado');

            if (pais.toLowerCase() === 'brasil') {
                resultado.textContent = 'Você é Brasileiro!';
            } else {
                resultado.textContent = 'Você é estrangeiro!';
            }
        }
    </script>
    
</body>
</html>
