<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript - Variáveis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 50px;
        }
    </style>
</head>
<body>
    <h1>Variáveis em JavaScript</h1>
    <p>Exemplo de uso de variáveis em JavaScript.</p>
    <p>o comando window.prompt() é usado para solicitar ao usuário que insira um valor e retorna esse valor como uma string.</p>

    <script>
        // Declaração de variáveis
        let nome = window.prompt("Qual é o seu nome?");
        let idade = window.prompt("Qual é a sua idade?");
        
        // Exibindo as informações usando alert
        window.alert(`Olá, ${nome}! Você tem ${idade} anos.`);
        
        // Exibindo as informações no console
        console.log(`Nome: ${nome}`);
        console.log(`Idade: ${idade}`);
    </script>
</body>
</html>
