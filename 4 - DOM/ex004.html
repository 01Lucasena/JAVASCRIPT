<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
    </style>
</head>
<body id="corpo">
    <header>
        <h1>Iniciando estudos com DOM</h1>
    </header>
    <button class="botao-acao">Clique em mim</button>
    <script>
        const cabecalho = document.querySelector('header h1');
        const botao = document.querySelectorAll('.botao-acao');
        const corpo = document.getElementById('corpo');
        const itens = document.getElementsByClassName('botao-acao');
        const titulos = document.getElementsByTagName('h1');

        function alterarCor() {
            corpo.style.backgroundColor = '#d0e0f0';
            cabecalho.textContent = 'Você clicou no botão!';
        }

        botao.forEach((btn) => {
            btn.addEventListener('click', alterarCor);
        });
    </script>
</body>
</html>
